version: '3.3'

services:
  # Serviço da aplicação web SSH
  webssh:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASSWORD=SG515t3m45
      - DB_NAME=webssh_db
      - DB_PORT=5432
      - JWT_SECRET=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkVkZ2FyIGRlIFBvbnRlcyIsImFkbWluIjp0cnVlLCJpYXQiOjE1MTYyMzkwMjJ9.ezptM7hKHT1e8fVED-YaLbazZpF2GPm2hwGCBUbzJ5c
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  # Serviço do banco de dados PostgreSQL
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SG515t3m45
      POSTGRES_DB: webssh_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d webssh_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
