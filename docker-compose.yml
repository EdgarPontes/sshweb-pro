version: '3.8'

services:
  # Serviço da aplicação web SSH
  webssh:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=senha_segura
      - DB_NAME=webssh_db
      - JWT_SECRET=chave_secreta_jwt
    depends_on:
      - mysql
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  # Serviço do banco de dados MySQL
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: senha_segura
      MYSQL_DATABASE: webssh_db
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    restart: unless-stopped

volumes:
  mysql_data: